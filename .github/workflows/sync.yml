name: Weekly sync from claude.aiso.cool
on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch: {}
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch live README from source site
        run: |
          /usr/bin/curl -sfL "https://claude.aiso.cool/api/awesome-readme.md" -o README.new.md || \
          /usr/bin/curl -sfL "https://raw.githubusercontent.com/xiaohei16k/claude-aiso-followup-export/main/awesome-claude-commands-zh-README.md" -o README.new.md
          if [ -s README.new.md ] && ! /usr/bin/diff -q README.md README.new.md > /dev/null 2>&1; then
            /usr/bin/mv README.new.md README.md
            /usr/bin/git config user.name 'github-actions[bot]'
            /usr/bin/git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            /usr/bin/git add README.md
            /usr/bin/git commit -m "Weekly sync from claude.aiso.cool ($(date -u +%Y-%m-%d))"
            /usr/bin/git push
          else
            echo "no changes or fetch failed"
          fi

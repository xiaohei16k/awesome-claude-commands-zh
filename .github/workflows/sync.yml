# Weekly sync workflow.
# 当前状态:仅手动触发(workflow_dispatch)。
# Cron 部分预留待 claude.aiso.cool 暴露 /api/awesome-readme.md endpoint 后启用。
name: Weekly sync from claude.aiso.cool
on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "17 3 * * 1"  # 启用前先确保 endpoint 可访问
jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch live README from source site
        run: |
          set -e
          URL="https://claude.aiso.cool/api/awesome-readme.md"
          if /usr/bin/curl -sfL "$URL" -o README.new.md && [ -s README.new.md ]; then
            if ! /usr/bin/diff -q README.md README.new.md > /dev/null 2>&1; then
              /usr/bin/mv README.new.md README.md
              /usr/bin/git config user.name 'github-actions[bot]'
              /usr/bin/git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
              /usr/bin/git add README.md
              /usr/bin/git commit -m "Weekly sync from claude.aiso.cool ($(date -u +%Y-%m-%d))"
              /usr/bin/git push
            else
              echo "no changes"
            fi
          else
            echo "endpoint not available yet"
            exit 0
          fi
